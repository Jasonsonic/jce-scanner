name: JCE Daily Scan
on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 1-5"
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "jce-pages"
  cancel-in-progress: false
jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - uses: actions/cache@v4
        with:
          path: data_cache
          key: jce-market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            jce-market-data-${{ runner.os }}-
      - run: python -m pip install -r requirements.txt
      - run: python github_pages_runner.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
