name: JCE Daily Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 1-5"
  push:
    branches: ["main"]
    paths:
      - "jce_scan.py"
      - "github_pages_runner.py"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/jce-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "jce-pages"
  cancel-in-progress: false

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore market-data cache
        uses: actions/cache@v4
        with:
          path: data_cache
          key: jce-market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            jce-market-data-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run scanner and build website
        run: python github_pages_runner.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
